name: Paid work inquiry
description: Request a paid technical writing, Crawlee/Apify, or developer automation task.
title: "[Paid inquiry] "
labels:
  - paid-inquiry
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out. Please avoid posting secrets, API keys, private customer data, or payment credentials here.
  - type: dropdown
    id: work_type
    attributes:
      label: Work type
      options:
        - Technical article or tutorial
        - Crawlee / Apify Actor build
        - GitHub automation or issue triage workflow
        - Code review / debugging write-up
        - Other developer automation
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Project context
      description: What are you trying to build, publish, debug, or automate?
      placeholder: Briefly describe the project, audience, existing repo/docs, and the outcome you need.
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Expected deliverables
      description: List concrete outputs such as article draft, working repo, Actor package, review report, or automation script.
      placeholder: |
        - 1,500-word technical article
        - Working TypeScript demo repo
        - Apify Actor input schema
        - Verification notes
    validations:
      required: true
  - type: input
    id: timeline
    attributes:
      label: Timeline
      placeholder: Example: within 1 week
    validations:
      required: true
  - type: input
    id: budget
    attributes:
      label: Budget range
      description: A rough range is enough for initial scoping.
      placeholder: Example: 300-800 USD
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Relevant links
      description: Public links only. Do not include credentials.
      placeholder: Repo, docs, issue, product page, writing brief, or reference examples.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, private user data, credentials, or payment information in this issue.
          required: true
